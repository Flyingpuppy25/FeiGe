name: Build macOS portable packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-macos:
    name: macOS ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-15
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run self-tests
        run: npm test

      - name: Install Intel FFmpeg assembler
        if: matrix.arch == 'x64'
        run: brew install nasm

      - name: Build portable LGPL FFmpeg
        run: bash scripts/build-ffmpeg-macos.sh

      - name: Build FeiGe app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac dir --${{ matrix.arch }} --config electron-builder.mac.js

      - name: Package portable ZIP
        run: bash scripts/package-macos.sh

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: FeiGe-macOS-${{ matrix.arch }}
          path: |
            release-mac/FeiGe-*-macOS-${{ matrix.arch }}.zip
            release-mac/FeiGe-*-macOS-${{ matrix.arch }}-SHA256.txt
          if-no-files-found: error
          compression-level: 0
